# AX Serving backend routing configuration
#
# CURRENT POLICY: AX Serving is the serving/orchestration layer, not the
# token-generation engine. Default embedded local loading should target
# ax-engine artifact directories. GGUF / llama.cpp remains a compatibility
# path only when explicitly requested by an operator.
#
# Backends:
#   native    — ax-engine SDK v4 session (requires AX MLX artifacts + Metal)
#   llama_cpp — legacy llama-server subprocess compatibility path
#   lib_llama — direct libllama C API, no subprocess (requires `libllama` feature; Phase 2)
#   auto      — AX artifact directories use native; GGUF compatibility uses llama_cpp
#
# Family detection:
#   Primary:  reads `general.architecture` from the GGUF header (authoritative).
#   Fallback: lowercase filename substring match (used if GGUF is unreadable).
#
# Lookup order:
#   1. Exact match on `general.architecture` value (e.g. "qwen3")
#   2. Prefix match (e.g. key "qwen" matches "qwen2", "qwen3", "qwen2_moe")
#   3. default_backend
#
# Loading order for this config file:
#   1. Explicit --routing-config path
#   2. $AXS_ROUTING_CONFIG env var path
#   3. ./backends.yaml in CWD
#   4. Built-in defaults
#
# To opt into the embedded llama.cpp compatibility path, use an explicit
# per-load backend (`llama_cpp`) or provide an override routing file that maps
# the relevant families to `llama_cpp`.

# Unknown families: use ax-engine artifact loading by default.
default_backend: native

families: {}
