# AX Serving backend routing configuration
#
# CURRENT POLICY: ax-engine (native) is the primary backend for supported families.
# llama.cpp is the fallback for unsupported architectures and explicit llama_cpp families.
#
# Backends:
#   native    — ax-engine (primary; requires Xcode Metal toolchain)
#   llama_cpp — llama-server subprocess (requires llama-server on PATH via brew install llama.cpp)
#   lib_llama — direct libllama C API, no subprocess (requires `libllama` feature; Phase 2)
#   auto      — try native first; fall back to llama_cpp on unsupported arch
#
# Family detection:
#   Primary:  reads `general.architecture` from the GGUF header (authoritative).
#   Fallback: lowercase filename substring match (used if GGUF is unreadable).
#
# Lookup order:
#   1. Exact match on `general.architecture` value (e.g. "qwen3")
#   2. Prefix match (e.g. key "qwen" matches "qwen2", "qwen3", "qwen2_moe")
#   3. default_backend
#
# Loading order for this config file:
#   1. $AXS_ROUTING_CONFIG env var path
#   2. ./backends.yaml in CWD
#   3. Built-in defaults (default_backend: auto)

# Unknown families: try native first, fall back to llama.cpp on unsupported arch.
default_backend: auto

families:
  # ── ax-engine native (primary) ─────────────────────────────────────────────
  llama:     native   # LLaMA / LLaMA 3 / CodeLlama
  qwen:      native   # Qwen 2/3
  gemma:     native   # Gemma 2/3
  mistral:   native   # Mistral / Mistral 3

  # ── auto (native where supported, llama.cpp fallback) ─────────────────────
  deepseek:  auto     # Distills may identify as llama/qwen; keep fallback enabled.
  phi:       auto     # phi3 is supported natively; older Phi variants still fall back safely.
  falcon:    auto     # Falcon native support depends on architecture variant.
  glm:       auto     # GLM/chatglm can use native when GGUF arch matches; fallback otherwise.
  mixtral:   auto     # Mixtral has native support but remains safer behind fallback.
  starcoder: auto     # StarCoder2 can use native; older StarCoder variants still fall back.

  # ── llama.cpp only (no ax-engine support today) ───────────────────────────
  gptj:     llama_cpp  # GPT-J
  gpt_neox: llama_cpp  # GPT-NeoX / Pythia / RedPajama
  minimax:  llama_cpp  # MiniMax
