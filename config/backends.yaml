# AX Serving backend routing configuration
#
# CURRENT POLICY: route all models through llama.cpp by default.
# ax-engine remains available only as an explicit per-load override (`native`).
#
# Backends:
#   native    — ax-engine (explicit opt-in; requires Xcode Metal toolchain)
#   llama_cpp — llama-server subprocess (requires llama-server on PATH via brew install llama.cpp)
#   lib_llama — direct libllama C API, no subprocess (requires `libllama` feature; Phase 2)
#   auto      — try native first; fall back to llama_cpp on unsupported arch
#
# Family detection:
#   Primary:  reads `general.architecture` from the GGUF header (authoritative).
#   Fallback: lowercase filename substring match (used if GGUF is unreadable).
#
# Lookup order:
#   1. Exact match on `general.architecture` value (e.g. "qwen3")
#   2. Prefix match (e.g. key "qwen" matches "qwen2", "qwen3", "qwen2_moe")
#   3. default_backend
#
# Loading order for this config file:
#   1. $AXS_ROUTING_CONFIG env var path
#   2. ./backends.yaml in CWD
#   3. Built-in defaults (default_backend: llama_cpp)

# Unknown families: route to llama.cpp.
default_backend: llama_cpp

families:
  # ── explicit routing (llama.cpp) ─────────────────────────────────────────
  llama:     llama_cpp   # LLaMA / LLaMA 3 / CodeLlama
  qwen:      llama_cpp   # Qwen 2/3
  gemma:     llama_cpp   # Gemma 2/3
  mistral:   llama_cpp   # Mistral / Mistral 3
  deepseek:  llama_cpp   # Distilled models.
  phi:       llama_cpp   # phi2 / phi3
  falcon:    llama_cpp   # Falcon
  glm:       llama_cpp   # GLM / ChatGLM
  mixtral:   llama_cpp   # Mixtral
  starcoder: llama_cpp   # StarCoder2
  gptj:      llama_cpp   # GPT-J
  gpt_neox:  llama_cpp   # GPT-NeoX / Pythia / RedPajama
  minimax:   llama_cpp   # MiniMax
