syntax = "proto3";

package ax.serving.v1;

option go_package = "ax-serving/go/pkg/proto;axpb";

// ── Enums ─────────────────────────────────────────────────────────────────────

enum BackendType {
  BACKEND_TYPE_UNSPECIFIED = 0;
  BACKEND_TYPE_CPU = 1;
  BACKEND_TYPE_METAL = 2;
  BACKEND_TYPE_AUTO = 3;
}

enum ThermalState {
  THERMAL_STATE_NOMINAL = 0;
  THERMAL_STATE_FAIR = 1;
  THERMAL_STATE_SERIOUS = 2;
  THERMAL_STATE_CRITICAL = 3;
}

enum ServingStatus {
  SERVING_STATUS_UNSPECIFIED = 0;
  SERVING_STATUS_SERVING = 1;
  SERVING_STATUS_NOT_SERVING = 2;
}

enum FinishReason {
  FINISH_REASON_UNSPECIFIED = 0;
  FINISH_REASON_EOS = 1;
  FINISH_REASON_MAX_TOKENS = 2;
  FINISH_REASON_STOP_SEQUENCE = 3;
}

// ── Service ───────────────────────────────────────────────────────────────────

service AxServingService {
  rpc LoadModel(LoadModelRequest)     returns (LoadModelResponse);
  rpc UnloadModel(UnloadModelRequest) returns (UnloadModelResponse);
  rpc ListModels(ListModelsRequest)   returns (ListModelsResponse);
  rpc Infer(InferRequest)             returns (stream InferResponse);
  rpc Health(HealthRequest)           returns (HealthResponse);
  rpc GetMetrics(GetMetricsRequest)   returns (GetMetricsResponse);
}

// ── Load / Unload / List ──────────────────────────────────────────────────────

message LoadModelRequest {
  string model_path     = 1;
  string model_id       = 2;
  BackendType backend   = 3;
  uint32 context_length = 4;
}

message ModelInfo {
  string      id            = 1;
  string      architecture  = 2;
  uint32      n_layers      = 3;
  uint32      n_heads       = 4;
  uint32      n_kv_heads    = 5;
  uint32      embedding_dim = 6;
  uint32      vocab_size    = 7;
  uint32      context_length = 8;
  uint64      file_size_bytes = 9;
  BackendType backend       = 10;
}

message LoadModelResponse {
  string    model_id       = 1;
  ModelInfo info           = 2;
  uint64    load_time_ms   = 3;
  uint64    peak_rss_bytes = 4;
}

message UnloadModelRequest {
  string model_id = 1;
}

message UnloadModelResponse {
  string model_id = 1;
}

message ListModelsRequest {}

message ListModelsResponse {
  repeated ModelInfo models = 1;
}

// ── Infer ─────────────────────────────────────────────────────────────────────

message ChatMessage {
  string role    = 1;
  string content = 2;
}

message SamplingParams {
  float  temperature    = 1;
  uint32 top_k          = 2;
  float  top_p          = 3;
  float  repeat_penalty = 4;
  uint64 seed           = 5;
}

message InferRequest {
  string                 model_id   = 1;
  string                 prompt     = 2;
  repeated ChatMessage   messages   = 3;
  SamplingParams         sampling   = 4;
  uint32                 max_tokens = 5;
}

message GenerationMetrics {
  uint32 prefill_tokens       = 1;
  uint32 decode_tokens        = 2;
  float  prefill_tok_per_sec  = 3;
  float  decode_tok_per_sec   = 4;
  uint64 total_time_ms        = 5;
}

message InferResponse {
  string            text          = 1;
  uint32            token_id      = 2;
  bool              finished      = 3;
  FinishReason      finish_reason = 4;
  GenerationMetrics metrics       = 5;
}

// ── Health ────────────────────────────────────────────────────────────────────

message HealthRequest {}

message HealthResponse {
  ServingStatus    status        = 1;
  repeated string  model_ids     = 2;
  uint64           uptime_secs   = 3;
  ThermalState     thermal_state = 4;
}

// ── Metrics ───────────────────────────────────────────────────────────────────

message GetMetricsRequest {}

message SystemMetrics {
  uint64       rss_bytes          = 1;
  uint64       peak_rss_bytes     = 2;
  ThermalState thermal_state      = 3;
  int64        inflight_count     = 4;
  uint64       total_requests     = 5;
  uint64       rejected_requests  = 6;
  uint64       avg_queue_wait_us  = 7;
}

message ModelMetrics {
  string model_id               = 1;
  uint64 total_infer_requests   = 2;
  double avg_prefill_tok_per_sec = 3;
  double avg_decode_tok_per_sec  = 4;
}

message GetMetricsResponse {
  SystemMetrics          system = 1;
  repeated ModelMetrics  models = 2;
}
